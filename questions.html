<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Запитання — ЩДК</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="supabase.js"></script>
  <style>
    /* ── Редагування ── */
    .q-actions {
      display: flex;
      gap: 0.25rem;
      opacity: 0;
      transition: opacity 0.2s;
      flex-shrink: 0;
      padding-top: 0.1rem;
    }
    .question-item:hover .q-actions { opacity: 1; }

    .inline-edit-form {
      display: none;
      padding: 1.25rem 1.5rem;
      border-top: 1px solid var(--border);
      background: var(--bg);
      gap: 0.9rem;
      flex-direction: column;
    }
    .inline-edit-form.open { display: flex; }

    .edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    @media (max-width: 600px) { .edit-row { grid-template-columns: 1fr; } }

    .edit-textarea {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 0.85rem;
      color: var(--text);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.93rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    .edit-textarea:focus { border-color: var(--accent); }

    .edit-footer {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    /* Кнопка додати запитання */
    .add-question-btn {
      width: 100%;
      padding: 1rem;
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      background: transparent;
      color: var(--text-muted);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }
    .add-question-btn:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
      background: rgba(201,168,76,0.04);
    }

    /* Редагування метаданих пакету */
    .pkg-edit-form {
      display: none;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      gap: 0.9rem;
      flex-direction: column;
    }
    .pkg-edit-form.open { display: flex; }

    .pkg-edit-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Drag-to-reorder handle */
    .drag-handle {
      cursor: grab;
      color: var(--text-dim);
      padding: 0.2rem 0.3rem;
      font-size: 1rem;
      line-height: 1;
      flex-shrink: 0;
      user-select: none;
    }
    .drag-handle:active { cursor: grabbing; }
    .question-item.dragging { opacity: 0.4; }
    .question-item.drag-over { border-color: var(--accent); }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="site-logo">ЩДК <span>/ база запитань</span></div>
    <nav class="nav-links">
      <a href="index.html">← Пакети</a>
      <a href="randomizer.html">🎲 Рандомайзер</a>
    </nav>
  </div>
</header>

<main class="main-content">

  <!-- Заголовок пакету -->
  <div class="questions-header">
    <div class="package-info" style="flex:1;">
      <div class="breadcrumb">
        <a href="index.html">Пакети</a> / <span id="breadTitle">…</span>
      </div>
      <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
        <h1 class="page-title" id="pkgTitle" style="margin-bottom:0;">…</h1>
        <button class="btn btn-ghost" onclick="togglePkgEdit()" id="pkgEditBtn"
                style="border:1px solid var(--border);font-size:0.82rem;padding:0.35rem 0.8rem;">
          ✏️ Редагувати пакет
        </button>
      </div>
      <div class="package-meta" id="pkgMeta" style="margin-top:0.5rem;"></div>
    </div>
  </div>

  <!-- Форма редагування метаданих пакету -->
  <div class="pkg-edit-form" id="pkgEditForm">
    <div class="pkg-edit-title">Метадані пакету</div>
    <div class="form-group" style="margin:0;">
      <label class="form-label">Назва *</label>
      <input type="text" class="form-input" id="peTitle" />
    </div>
    <div class="form-row">
      <div class="form-group" style="margin:0;">
        <label class="form-label">Турнір</label>
        <input type="text" class="form-input" id="peTournament" />
      </div>
      <div class="form-group" style="margin:0;">
        <label class="form-label">Дата</label>
        <input type="date" class="form-input" id="peDate" />
      </div>
    </div>
    <div class="form-group" style="margin:0;">
      <label class="form-label">Результат</label>
      <input type="text" class="form-input" id="peResult" placeholder="1 місце, 18/18" />
    </div>
    <div style="display:flex;gap:0.5rem;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="togglePkgEdit()">Скасувати</button>
      <button class="btn btn-primary" onclick="savePkgMeta()">💾 Зберегти</button>
    </div>
  </div>

  <!-- Статистика + кнопки -->
  <div class="stats-bar" id="statsRow">
    <div class="stat-pill">❓ <span class="stat-num" id="qCount">0</span> запитань</div>
    <div class="stat-pill">👁 <span id="revealedCount">0</span> відкрито</div>
  </div>

  <!-- Тулбар -->
  <div class="toolbar">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Пошук у запитаннях…" oninput="filterQuestions()" />
    </div>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
      <button class="btn btn-secondary" onclick="collapseAll()">🙈 Сховати всі</button>
      <button class="btn btn-primary" onclick="revealAll()">👁 Всі відповіді</button>
    </div>
  </div>

  <!-- Список запитань -->
  <div id="questionsList"></div>

  <!-- Кнопка додати запитання -->
  <button class="add-question-btn" id="addQuestionBtn" onclick="addNewQuestion()" style="display:none;">
    + Додати запитання
  </button>

  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon">🔎</div>
    <h3>Нічого не знайдено</h3>
    <p>Спробуйте інший пошуковий запит</p>
  </div>

</main>

<!-- ===== МОДАЛЬНЕ ВІКНО: РЕДАГУВАННЯ ЗАПИТАННЯ ===== -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">✏️ Редагування запитання <span id="editModalNum" style="color:var(--accent);"></span></h2>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Тема / Тур</label>
        <input type="text" class="form-input" id="emTopic" placeholder="Тур 1, Тематика тощо" />
      </div>
      <div class="form-group">
        <label class="form-label">Текст запитання *</label>
        <textarea class="form-input" id="emQuestion" rows="4" style="resize:vertical;"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Відповідь</label>
        <input type="text" class="form-input" id="emAnswer" />
      </div>
      <div class="form-group">
        <label class="form-label">Коментар</label>
        <textarea class="form-input" id="emComment" rows="3" style="resize:vertical;"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="deleteQuestion(currentEditNum)">🗑 Видалити</button>
      <button class="btn btn-secondary" onclick="closeEditModal()">Скасувати</button>
      <button class="btn btn-primary" onclick="saveEditedQuestion()">💾 Зберегти</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
let currentPackage = null;
let revealedSet = new Set();
let currentEditNum = null;
let isSearching = false;

// ── Завантаження ──────────────────────────────
async function saveCurrentPackage() {
  try {
    await dbUpdatePackage(currentPackage);
  } catch (err) {
    showToast('Помилка збереження: ' + err.message, 'error');
  }
}

// ── Ініціалізація ─────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) { window.location.href = 'index.html'; return; }

  // Показуємо індикатор завантаження
  document.getElementById('pkgTitle').textContent = '…';
  document.getElementById('breadTitle').textContent = '…';

  try {
    currentPackage = await dbGetPackage(id);
    console.log('[questions] Завантажено пакет:', currentPackage);
  } catch (err) {
    console.error('[questions] Помилка:', err);
    showToast('Помилка завантаження: ' + err.message, 'error');
  }

  if (!currentPackage) {
    console.error('[questions] Пакет не знайдено для id:', id);
    showToast('Пакет не знайдено', 'error');
    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
    return;
  }

  // Гарантуємо що questions — масив
  if (!Array.isArray(currentPackage.questions)) {
    console.warn('[questions] questions не є масивом, спроба розпарсити');
    try {
      currentPackage.questions = typeof currentPackage.questions === 'string'
        ? JSON.parse(currentPackage.questions)
        : [];
    } catch { currentPackage.questions = []; }
  }

  console.log('[questions] Кількість запитань:', currentPackage.questions.length);
  renderHeader();
  renderQuestions(currentPackage.questions);
  document.getElementById('addQuestionBtn').style.display = 'block';
});

function renderHeader() {
  document.title = `${currentPackage.title} — ЩДК`;
  document.getElementById('pkgTitle').textContent = currentPackage.title;
  document.getElementById('breadTitle').textContent = currentPackage.title;
  document.getElementById('qCount').textContent = currentPackage.questions.length;
  const metaItems = [];
  if (currentPackage.date)       metaItems.push(`📅 ${formatDate(currentPackage.date)}`);
  if (currentPackage.tournament) metaItems.push(`🏆 ${escHtml(currentPackage.tournament)}`);
  if (currentPackage.result)     metaItems.push(`🥇 ${escHtml(currentPackage.result)}`);
  document.getElementById('pkgMeta').innerHTML = metaItems.map(i => `<span class="meta-item">${i}</span>`).join('');
}

// ── Редагування метаданих пакету ──────────────
function togglePkgEdit() {
  const form = document.getElementById('pkgEditForm');
  const open = form.classList.contains('open');
  if (!open) {
    document.getElementById('peTitle').value      = currentPackage.title      || '';
    document.getElementById('peTournament').value = currentPackage.tournament || '';
    document.getElementById('peDate').value       = currentPackage.date       || '';
    document.getElementById('peResult').value     = currentPackage.result     || '';
  }
  form.classList.toggle('open', !open);
  document.getElementById('pkgEditBtn').textContent = open ? '✏️ Редагувати пакет' : '✕ Скасувати';
}

async function savePkgMeta() {
  const title = document.getElementById('peTitle').value.trim();
  if (!title) { showToast('Введіть назву пакету', 'error'); return; }
  currentPackage.title      = title;
  currentPackage.tournament = document.getElementById('peTournament').value.trim();
  currentPackage.date       = document.getElementById('peDate').value;
  currentPackage.result     = document.getElementById('peResult').value.trim();
  await saveCurrentPackage();
  renderHeader();
  document.getElementById('pkgEditForm').classList.remove('open');
  document.getElementById('pkgEditBtn').textContent = '✏️ Редагувати пакет';
  showToast('Метадані збережено', 'success');
}

// ── Рендер запитань ───────────────────────────
function renderQuestions(questions) {
  const list  = document.getElementById('questionsList');
  const empty = document.getElementById('emptyState');
  if (questions.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  list.innerHTML = questions.map(q => buildQuestionHTML(q)).join('');
  updateRevealedCount();
}

function buildQuestionHTML(q) {
  const hasAnswer = q.answer || q.comment;
  const isRevealed = revealedSet.has(q.number);
  return `
    <div class="question-item" id="qi_${q.number}"
         draggable="true"
         ondragstart="dragStart(event,${q.number})"
         ondragover="dragOver(event,${q.number})"
         ondrop="dragDrop(event,${q.number})"
         ondragleave="dragLeave(event,${q.number})">
      <div class="question-header">
        <span class="drag-handle" title="Перетягнути">⠿</span>
        <div class="q-number">${q.number}</div>
        <div class="q-body">
          ${q.topic ? `<div class="q-topic">${escHtml(q.topic)}</div>` : ''}
          <div class="q-text">${escHtml(q.question)}</div>
        </div>
        <div class="q-actions">
          <button class="btn btn-ghost" onclick="openEditModal(${q.number})"
                  style="padding:0.3rem 0.6rem;font-size:0.8rem;" title="Редагувати">✏️</button>
          <button class="btn btn-ghost" onclick="deleteQuestion(${q.number})"
                  style="padding:0.3rem 0.6rem;font-size:0.8rem;color:var(--danger);" title="Видалити">🗑</button>
        </div>
      </div>

      ${hasAnswer ? `
        <button class="spoiler-toggle ${isRevealed ? 'open' : ''}"
                id="toggle_${q.number}" onclick="toggleSpoiler(${q.number})">
          <span class="arrow">▶</span>
          ${isRevealed ? 'Сховати відповідь' : 'Показати відповідь'}
        </button>
        <div class="spoiler-content ${isRevealed ? 'visible' : ''}" id="spoiler_${q.number}">
          <div class="answer-block">
            ${q.answer  ? `<div class="answer-label">Відповідь</div><div class="answer-text">${escHtml(q.answer)}</div>` : ''}
            ${q.comment ? `<div class="comment-label" style="margin-top:0.6rem;">Коментар</div><div class="comment-text">${escHtml(q.comment)}</div>` : ''}
          </div>
        </div>` : `
        <div style="padding:0 1.5rem 1rem;font-size:0.82rem;color:var(--text-dim);font-style:italic;">
          Відповідь не вказана — <a href="#" onclick="openEditModal(${q.number});return false;" style="color:var(--accent);">додати</a>
        </div>`}
    </div>`;
}

// ── Модальне вікно редагування ────────────────
function openEditModal(num) {
  const q = currentPackage.questions.find(q => q.number === num);
  if (!q) return;
  currentEditNum = num;
  document.getElementById('editModalNum').textContent = `№${num}`;
  document.getElementById('emTopic').value    = q.topic    || '';
  document.getElementById('emQuestion').value = q.question || '';
  document.getElementById('emAnswer').value   = q.answer   || '';
  document.getElementById('emComment').value  = q.comment  || '';
  document.getElementById('editModal').classList.add('active');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('active');
  currentEditNum = null;
}

async function saveEditedQuestion() {
  const qText = document.getElementById('emQuestion').value.trim();
  if (!qText) { showToast('Текст запитання не може бути порожнім', 'error'); return; }
  const idx = currentPackage.questions.findIndex(q => q.number === currentEditNum);
  if (idx === -1) return;
  currentPackage.questions[idx] = {
    ...currentPackage.questions[idx],
    topic:    document.getElementById('emTopic').value.trim(),
    question: qText,
    answer:   document.getElementById('emAnswer').value.trim(),
    comment:  document.getElementById('emComment').value.trim(),
  };
  await saveCurrentPackage();
  // Оновлюємо тільки цю картку без повного ререндеру
  const el = document.getElementById(`qi_${currentEditNum}`);
  if (el) el.outerHTML = buildQuestionHTML(currentPackage.questions[idx]);
  closeEditModal();
  showToast('Запитання збережено', 'success');
}

// ── Видалення запитання ───────────────────────
async function deleteQuestion(num) {
  if (!confirm(`Видалити запитання №${num}?`)) return;
  currentPackage.questions = currentPackage.questions.filter(q => q.number !== num);
  await saveCurrentPackage();
  const el = document.getElementById(`qi_${num}`);
  if (el) el.remove();
  closeEditModal();
  document.getElementById('qCount').textContent = currentPackage.questions.length;
  showToast('Запитання видалено', 'info');
}

// ── Додати нове запитання ─────────────────────
async function addNewQuestion() {
  const maxNum = currentPackage.questions.reduce((m, q) => Math.max(m, q.number), 0);
  const newNum = maxNum + 1;
  const newQ = { number: newNum, question: '', answer: '', comment: '', topic: '' };
  currentPackage.questions.push(newQ);
  await saveCurrentPackage();
  document.getElementById('qCount').textContent = currentPackage.questions.length;
  // Додаємо картку перед кнопкою
  const addBtn = document.getElementById('addQuestionBtn');
  const div = document.createElement('div');
  div.innerHTML = buildQuestionHTML(newQ);
  addBtn.parentNode.insertBefore(div.firstElementChild, addBtn);
  // Одразу відкриваємо редактор
  openEditModal(newNum);
}

// ── Drag & Drop (перестановка) ────────────────
let draggedNum = null;

function dragStart(e, num) {
  draggedNum = num;
  setTimeout(() => document.getElementById(`qi_${num}`)?.classList.add('dragging'), 0);
}
function dragOver(e, num) {
  e.preventDefault();
  if (num !== draggedNum) document.getElementById(`qi_${num}`)?.classList.add('drag-over');
}
function dragLeave(e, num) {
  document.getElementById(`qi_${num}`)?.classList.remove('drag-over');
}
async function dragDrop(e, targetNum) {
  e.preventDefault();
  document.getElementById(`qi_${targetNum}`)?.classList.remove('drag-over');
  document.getElementById(`qi_${draggedNum}`)?.classList.remove('dragging');
  if (draggedNum === targetNum) return;

  const questions = currentPackage.questions;
  const fromIdx = questions.findIndex(q => q.number === draggedNum);
  const toIdx   = questions.findIndex(q => q.number === targetNum);
  if (fromIdx === -1 || toIdx === -1) return;

  // Переставляємо в масиві
  const [item] = questions.splice(fromIdx, 1);
  questions.splice(toIdx, 0, item);
  await saveCurrentPackage();
  renderQuestions(currentPackage.questions);
  draggedNum = null;
}

// ── Спойлери ──────────────────────────────────
function toggleSpoiler(num) {
  const s = document.getElementById(`spoiler_${num}`);
  const b = document.getElementById(`toggle_${num}`);
  const open = s.classList.contains('visible');
  s.classList.toggle('visible', !open);
  b.classList.toggle('open', !open);
  b.innerHTML = `<span class="arrow">▶</span> ${open ? 'Показати відповідь' : 'Сховати відповідь'}`;
  open ? revealedSet.delete(num) : revealedSet.add(num);
  updateRevealedCount();
}

function revealAll() {
  currentPackage?.questions.forEach(q => {
    const s = document.getElementById(`spoiler_${q.number}`);
    const b = document.getElementById(`toggle_${q.number}`);
    if (s && !s.classList.contains('visible')) {
      s.classList.add('visible'); b.classList.add('open');
      b.innerHTML = `<span class="arrow">▶</span> Сховати відповідь`;
      revealedSet.add(q.number);
    }
  });
  updateRevealedCount();
}

function collapseAll() {
  currentPackage?.questions.forEach(q => {
    const s = document.getElementById(`spoiler_${q.number}`);
    const b = document.getElementById(`toggle_${q.number}`);
    if (s) {
      s.classList.remove('visible'); b.classList.remove('open');
      b.innerHTML = `<span class="arrow">▶</span> Показати відповідь`;
      revealedSet.delete(q.number);
    }
  });
  updateRevealedCount();
}

function updateRevealedCount() {
  document.getElementById('revealedCount').textContent = revealedSet.size;
}

// ── Пошук ─────────────────────────────────────
function filterQuestions() {
  if (!currentPackage) return;
  const q = document.getElementById('searchInput').value.toLowerCase();
  isSearching = q.length > 0;
  document.getElementById('addQuestionBtn').style.display = isSearching ? 'none' : 'block';
  const filtered = currentPackage.questions.filter(item =>
    item.question.toLowerCase().includes(q) ||
    (item.answer || '').toLowerCase().includes(q) ||
    (item.topic  || '').toLowerCase().includes(q)
  );
  renderQuestions(filtered);
}

// ── Утиліти ───────────────────────────────────
function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('uk-UA',{day:'numeric',month:'long',year:'numeric'}); }
  catch { return d; }
}
function showToast(text, type='info') {
  const icons = {success:'✅',error:'❌',info:'ℹ️'};
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type]}</span><span>${text}</span>`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
</script>

</body>
</html>
