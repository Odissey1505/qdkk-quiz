<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Запитання — ЩДК</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="supabase.js"></script>
  <style>
    /* ── Редагування ── */
    .q-actions {
      display: flex;
      gap: 0.25rem;
      opacity: 0;
      transition: opacity 0.2s;
      flex-shrink: 0;
      padding-top: 0.1rem;
    }
    .question-item:hover .q-actions { opacity: 1; }

    .inline-edit-form {
      display: none;
      padding: 1.25rem 1.5rem;
      border-top: 1px solid var(--border);
      background: var(--bg);
      gap: 0.9rem;
      flex-direction: column;
    }
    .inline-edit-form.open { display: flex; }

    .edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    @media (max-width: 600px) { .edit-row { grid-template-columns: 1fr; } }

    .edit-textarea {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 0.85rem;
      color: var(--text);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.93rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    .edit-textarea:focus { border-color: var(--accent); }

    .edit-footer {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    /* Кнопка додати запитання */
    .add-question-btn {
      width: 100%;
      padding: 1rem;
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      background: transparent;
      color: var(--text-muted);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }
    .add-question-btn:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
      background: rgba(201,168,76,0.04);
    }

    /* Редагування метаданих пакету */
    .pkg-edit-form {
      display: none;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      gap: 0.9rem;
      flex-direction: column;
    }
    .pkg-edit-form.open { display: flex; }

    .pkg-edit-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Drag-to-reorder handle */
    .drag-handle {
      cursor: grab;
      color: var(--text-dim);
      padding: 0.2rem 0.3rem;
      font-size: 1rem;
      line-height: 1;
      flex-shrink: 0;
      user-select: none;
    }
    .drag-handle:active { cursor: grabbing; }
    .question-item.dragging { opacity: 0.4; }
    .question-item.drag-over { border-color: var(--accent); }

    /* ── Мітки на запитаннях ── */
    .q-labels {
      display: flex;
      gap: 0.25rem;
      flex-shrink: 0;
      align-items: center;
    }

    .label-btn {
      background: none;
      border: 1.5px solid transparent;
      border-radius: 6px;
      font-size: 1rem;
      line-height: 1;
      padding: 0.2rem 0.35rem;
      cursor: pointer;
      opacity: 0.25;
      transition: all 0.18s ease;
    }
    .label-btn:hover { opacity: 0.7; transform: scale(1.15); }
    .label-btn.active { opacity: 1; border-color: currentColor; background: rgba(255,255,255,0.06); }
    .label-btn.star.active  { color: #f5c842; border-color: #f5c842; }
    .label-btn.hard.active  { color: var(--danger); border-color: var(--danger); }
    .label-btn.check.active { color: var(--spoiler-text); border-color: var(--spoiler-text); }

    /* ── Фільтр-бар міток ── */
    .label-filter-bar {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .label-filter-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 0.35rem 0.9rem;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .label-filter-btn:hover { border-color: var(--accent-dim); color: var(--text); }
    .label-filter-btn.active { color: var(--bg); }
    .label-filter-btn.active.all  { background: var(--accent); border-color: var(--accent); color: #0d1117; }
    .label-filter-btn.active.star { background: #f5c842; border-color: #f5c842; color: #0d1117; }
    .label-filter-btn.active.hard { background: var(--danger); border-color: var(--danger); color: white; }
    .label-filter-btn.active.check{ background: var(--spoiler-text); border-color: var(--spoiler-text); color: #0d1117; }

    .label-filter-count {
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 0 0.4rem;
      font-size: 0.75rem;
    }

    /* ── Теги запитань ── */
    .q-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      padding: 0 1.5rem 0.9rem;
    }

    .q-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.25);
      color: var(--accent-dim);
      border-radius: 20px;
      padding: 0.15rem 0.65rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: all 0.18s;
    }
    .q-tag:hover {
      background: rgba(201,168,76,0.2);
      color: var(--accent);
    }

    /* Редактор тегів */
    .tag-editor {
      padding: 0.75rem 1.5rem 1rem;
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: none;
    }
    .tag-editor.open { display: block; }

    .tag-editor-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
      margin-bottom: 0.6rem;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--accent);
      color: #0d1117;
      border-radius: 20px;
      padding: 0.2rem 0.5rem 0.2rem 0.75rem;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .tag-chip-remove {
      background: none;
      border: none;
      color: #0d1117;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      padding: 0;
      opacity: 0.7;
    }
    .tag-chip-remove:hover { opacity: 1; }

    .tag-input-wrap {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex: 1;
      min-width: 200px;
    }
    .tag-input {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.4rem 0.75rem;
      color: var(--text);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.88rem;
      outline: none;
    }
    .tag-input:focus { border-color: var(--accent); }

    .tag-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .tag-suggestion {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.2rem 0.65rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .tag-suggestion:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
      background: rgba(201,168,76,0.06);
    }

    /* Фільтр по тегах */
    .tag-filter-bar {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 1rem;
    }
    .tag-filter-label {
      font-size: 0.78rem;
      color: var(--text-dim);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .tag-filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 0.25rem 0.75rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.18s;
    }
    .tag-filter-chip:hover { border-color: var(--accent-dim); color: var(--text); }
    .tag-filter-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d1117;
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="site-logo">ЩДК <span>/ база запитань</span></div>
    <nav class="nav-links">
      <a href="index.html">← Пакети</a>
      <a href="randomizer.html">🎲 Рандомайзер</a>
    </nav>
  </div>
</header>

<main class="main-content">

  <!-- Заголовок пакету -->
  <div class="questions-header">
    <div class="package-info" style="flex:1;">
      <div class="breadcrumb">
        <a href="index.html">Пакети</a> / <span id="breadTitle">…</span>
      </div>
      <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
        <h1 class="page-title" id="pkgTitle" style="margin-bottom:0;">…</h1>
        <button class="btn btn-ghost" onclick="togglePkgEdit()" id="pkgEditBtn"
                style="border:1px solid var(--border);font-size:0.82rem;padding:0.35rem 0.8rem;">
          ✏️ Редагувати пакет
        </button>
      </div>
      <div class="package-meta" id="pkgMeta" style="margin-top:0.5rem;"></div>
    </div>
  </div>

  <!-- Форма редагування метаданих пакету -->
  <div class="pkg-edit-form" id="pkgEditForm">
    <div class="pkg-edit-title">Метадані пакету</div>
    <div class="form-group" style="margin:0;">
      <label class="form-label">Назва *</label>
      <input type="text" class="form-input" id="peTitle" />
    </div>
    <div class="form-row">
      <div class="form-group" style="margin:0;">
        <label class="form-label">Турнір</label>
        <input type="text" class="form-input" id="peTournament" />
      </div>
      <div class="form-group" style="margin:0;">
        <label class="form-label">Дата</label>
        <input type="date" class="form-input" id="peDate" />
      </div>
    </div>
    <div class="form-group" style="margin:0;">
      <label class="form-label">Результат</label>
      <input type="text" class="form-input" id="peResult" placeholder="1 місце, 18/18" />
    </div>
    <div style="display:flex;gap:0.5rem;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="togglePkgEdit()">Скасувати</button>
      <button class="btn btn-primary" onclick="savePkgMeta()">💾 Зберегти</button>
    </div>
  </div>

  <!-- Статистика + кнопки -->
  <div class="stats-bar" id="statsRow">
    <div class="stat-pill">❓ <span class="stat-num" id="qCount">0</span> запитань</div>
    <div class="stat-pill">👁 <span id="revealedCount">0</span> відкрито</div>
  </div>

  <!-- Фільтр по мітках -->
  <div class="label-filter-bar" id="labelFilterBar" style="display:none;">
    <span style="font-size:0.8rem;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;">Фільтр:</span>
    <button class="label-filter-btn active all" onclick="setLabelFilter('all',this)">Всі</button>
    <button class="label-filter-btn star" onclick="setLabelFilter('star',this)">⭐ Улюблені <span class="label-filter-count" id="cnt-star">0</span></button>
    <button class="label-filter-btn hard" onclick="setLabelFilter('hard',this)">🔴 Важкі <span class="label-filter-count" id="cnt-hard">0</span></button>
    <button class="label-filter-btn check" onclick="setLabelFilter('check',this)">✅ Відповіли <span class="label-filter-count" id="cnt-check">0</span></button>
  </div>

  <!-- Фільтр по тегах -->
  <div id="tagFilterBar" style="display:none; margin-bottom:1rem;">
    <div class="tag-filter-bar">
      <span class="tag-filter-label">Тема:</span>
      <span class="tag-filter-chip active" onclick="setTagFilter(null,this)">Всі</span>
      <span id="tagFilterChips"></span>
    </div>
  </div>

  <!-- Тулбар -->
  <div class="toolbar">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Пошук у запитаннях…" oninput="filterQuestions()" />
    </div>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
      <button class="btn btn-secondary" onclick="collapseAll()">🙈 Сховати всі</button>
      <button class="btn btn-primary" onclick="revealAll()">👁 Всі відповіді</button>
    </div>
  </div>

  <!-- Список запитань -->
  <div id="questionsList"></div>

  <!-- Кнопка додати запитання -->
  <button class="add-question-btn" id="addQuestionBtn" onclick="addNewQuestion()" style="display:none;">
    + Додати запитання
  </button>

  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon">🔎</div>
    <h3>Нічого не знайдено</h3>
    <p>Спробуйте інший пошуковий запит</p>
  </div>

</main>

<!-- ===== МОДАЛЬНЕ ВІКНО: РЕДАГУВАННЯ ЗАПИТАННЯ ===== -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">✏️ Редагування запитання <span id="editModalNum" style="color:var(--accent);"></span></h2>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Тема / Тур</label>
        <input type="text" class="form-input" id="emTopic" placeholder="Тур 1, Тематика тощо" />
      </div>
      <div class="form-group">
        <label class="form-label">Текст запитання *</label>
        <textarea class="form-input" id="emQuestion" rows="4" style="resize:vertical;"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Відповідь</label>
        <input type="text" class="form-input" id="emAnswer" />
      </div>
      <div class="form-group">
        <label class="form-label">Коментар</label>
        <textarea class="form-input" id="emComment" rows="3" style="resize:vertical;"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="deleteQuestion(currentEditNum)">🗑 Видалити</button>
      <button class="btn btn-secondary" onclick="closeEditModal()">Скасувати</button>
      <button class="btn btn-primary" onclick="saveEditedQuestion()">💾 Зберегти</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
let currentPackage = null;
let revealedSet = new Set();
let currentEditNum = null;
let isSearching = false;

// ── Завантаження ──────────────────────────────
async function saveCurrentPackage() {
  try {
    await dbUpdatePackage(currentPackage);
  } catch (err) {
    showToast('Помилка збереження: ' + err.message, 'error');
  }
}

// ── Ініціалізація ─────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) { window.location.href = 'index.html'; return; }

  // Показуємо індикатор завантаження
  document.getElementById('pkgTitle').textContent = '…';
  document.getElementById('breadTitle').textContent = '…';

  try {
    currentPackage = await dbGetPackage(id);
    console.log('[questions] Завантажено пакет:', currentPackage);
  } catch (err) {
    console.error('[questions] Помилка:', err);
    showToast('Помилка завантаження: ' + err.message, 'error');
  }

  if (!currentPackage) {
    console.error('[questions] Пакет не знайдено для id:', id);
    showToast('Пакет не знайдено', 'error');
    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
    return;
  }

  // Гарантуємо що questions — масив
  if (!Array.isArray(currentPackage.questions)) {
    console.warn('[questions] questions не є масивом, спроба розпарсити');
    try {
      currentPackage.questions = typeof currentPackage.questions === 'string'
        ? JSON.parse(currentPackage.questions)
        : [];
    } catch { currentPackage.questions = []; }
  }

  console.log('[questions] Кількість запитань:', currentPackage.questions.length);
  renderHeader();
  renderQuestions(currentPackage.questions);
  document.getElementById('addQuestionBtn').style.display = 'block';
});

function renderHeader() {
  document.title = `${currentPackage.title} — ЩДК`;
  document.getElementById('pkgTitle').textContent = currentPackage.title;
  document.getElementById('breadTitle').textContent = currentPackage.title;
  document.getElementById('qCount').textContent = currentPackage.questions.length;
  const metaItems = [];
  if (currentPackage.date)       metaItems.push(`📅 ${formatDate(currentPackage.date)}`);
  if (currentPackage.tournament) metaItems.push(`🏆 ${escHtml(currentPackage.tournament)}`);
  if (currentPackage.result)     metaItems.push(`🥇 ${escHtml(currentPackage.result)}`);
  document.getElementById('pkgMeta').innerHTML = metaItems.map(i => `<span class="meta-item">${i}</span>`).join('');
  // Оновлюємо лічильники міток
  setTimeout(updateLabelCounts, 0);
  setTimeout(updateTagFilterBar, 0);
}

// ── Редагування метаданих пакету ──────────────
function togglePkgEdit() {
  const form = document.getElementById('pkgEditForm');
  const open = form.classList.contains('open');
  if (!open) {
    document.getElementById('peTitle').value      = currentPackage.title      || '';
    document.getElementById('peTournament').value = currentPackage.tournament || '';
    document.getElementById('peDate').value       = currentPackage.date       || '';
    document.getElementById('peResult').value     = currentPackage.result     || '';
  }
  form.classList.toggle('open', !open);
  document.getElementById('pkgEditBtn').textContent = open ? '✏️ Редагувати пакет' : '✕ Скасувати';
}

async function savePkgMeta() {
  const title = document.getElementById('peTitle').value.trim();
  if (!title) { showToast('Введіть назву пакету', 'error'); return; }
  currentPackage.title      = title;
  currentPackage.tournament = document.getElementById('peTournament').value.trim();
  currentPackage.date       = document.getElementById('peDate').value;
  currentPackage.result     = document.getElementById('peResult').value.trim();
  await saveCurrentPackage();
  renderHeader();
  document.getElementById('pkgEditForm').classList.remove('open');
  document.getElementById('pkgEditBtn').textContent = '✏️ Редагувати пакет';
  showToast('Метадані збережено', 'success');
}

// ── Рендер запитань ───────────────────────────
function renderQuestions(questions) {
  const list  = document.getElementById('questionsList');
  const empty = document.getElementById('emptyState');
  if (questions.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  list.innerHTML = questions.map(q => buildQuestionHTML(q)).join('');
  updateRevealedCount();
}

function buildQuestionHTML(q) {
  const hasAnswer = q.answer || q.comment;
  const isRevealed = revealedSet.has(q.number);
  const uid = getQuestionUID(q.number);
  const labels = getLabels(uid);
  const tags = getQuestionTags(q.number);
  return `
    <div class="question-item" id="qi_${q.number}"
         draggable="true"
         ondragstart="dragStart(event,${q.number})"
         ondragover="dragOver(event,${q.number})"
         ondrop="dragDrop(event,${q.number})"
         ondragleave="dragLeave(event,${q.number})">
      <div class="question-header">
        <span class="drag-handle" title="Перетягнути">⠿</span>
        <div class="q-number">${q.number}</div>
        <div class="q-body">
          ${q.topic ? `<div class="q-topic">${escHtml(q.topic)}</div>` : ''}
          <div class="q-text">${escHtml(q.question)}</div>
        </div>
        <div class="q-labels">
          <button class="label-btn star ${labels.star  ? 'active' : ''}" onclick="toggleLabel(${q.number},'star')"  title="Улюблене">⭐</button>
          <button class="label-btn hard ${labels.hard  ? 'active' : ''}" onclick="toggleLabel(${q.number},'hard')"  title="Важке">🔴</button>
          <button class="label-btn check ${labels.check ? 'active' : ''}" onclick="toggleLabel(${q.number},'check')" title="Відповіли правильно">✅</button>
        </div>
        <div class="q-actions">
          <button class="btn btn-ghost" onclick="openEditModal(${q.number})"
                  style="padding:0.3rem 0.6rem;font-size:0.8rem;" title="Редагувати">✏️</button>
          <button class="btn btn-ghost" onclick="deleteQuestion(${q.number})"
                  style="padding:0.3rem 0.6rem;font-size:0.8rem;color:var(--danger);" title="Видалити">🗑</button>
        </div>
      </div>

      ${hasAnswer ? `
        <button class="spoiler-toggle ${isRevealed ? 'open' : ''}"
                id="toggle_${q.number}" onclick="toggleSpoiler(${q.number})">
          <span class="arrow">▶</span>
          ${isRevealed ? 'Сховати відповідь' : 'Показати відповідь'}
        </button>
        <div class="spoiler-content ${isRevealed ? 'visible' : ''}" id="spoiler_${q.number}">
          <div class="answer-block">
            ${q.answer  ? `<div class="answer-label">Відповідь</div><div class="answer-text">${escHtml(q.answer)}</div>` : ''}
            ${q.comment ? `<div class="comment-label" style="margin-top:0.6rem;">Коментар</div><div class="comment-text">${escHtml(q.comment)}</div>` : ''}
          </div>
        </div>` : `
        <div style="padding:0 1.5rem 1rem;font-size:0.82rem;color:var(--text-dim);font-style:italic;">
          Відповідь не вказана — <a href="#" onclick="openEditModal(${q.number});return false;" style="color:var(--accent);">додати</a>
        </div>`}

      <!-- Теги -->
      ${tags.length > 0 ? `
        <div class="q-tags">
          ${tags.map(t => `<span class="q-tag" onclick="setTagFilter('${escHtml(t)}',null)" title="Фільтрувати по темі">${escHtml(t)}</span>`).join('')}
          <button class="q-tag" onclick="openTagEditor(${q.number})" style="opacity:0.5;" title="Редагувати теги">＋</button>
        </div>` : `
        <div style="padding:0 1.5rem 0.75rem;">
          <button onclick="openTagEditor(${q.number})" style="background:none;border:1px dashed var(--border);border-radius:20px;padding:0.15rem 0.65rem;font-size:0.75rem;color:var(--text-dim);cursor:pointer;transition:all 0.15s;" onmouseover="this.style.borderColor='var(--accent-dim)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-dim)'">+ додати теги</button>
        </div>`}

      <!-- Редактор тегів -->
      <div class="tag-editor" id="tageditor_${q.number}">
        <div class="tag-editor-inner" id="tagchips_${q.number}">
          ${tags.map(t => `<span class="tag-chip">${escHtml(t)}<button class="tag-chip-remove" onclick="removeTag(${q.number},'${escHtml(t)}')">×</button></span>`).join('')}
          <div class="tag-input-wrap">
            <input class="tag-input" id="taginput_${q.number}" placeholder="Введи тему…"
                   onkeydown="handleTagInput(event,${q.number})"
                   oninput="showTagSuggestions(${q.number},this.value)" />
            <button class="btn btn-primary" onclick="addTagFromInput(${q.number})" style="padding:0.35rem 0.8rem;font-size:0.82rem;">Додати</button>
          </div>
        </div>
        <div class="tag-suggestions" id="tagsugg_${q.number}"></div>
      </div>
    </div>`;
}

// ── Модальне вікно редагування ────────────────
function openEditModal(num) {
  const q = currentPackage.questions.find(q => q.number === num);
  if (!q) return;
  currentEditNum = num;
  document.getElementById('editModalNum').textContent = `№${num}`;
  document.getElementById('emTopic').value    = q.topic    || '';
  document.getElementById('emQuestion').value = q.question || '';
  document.getElementById('emAnswer').value   = q.answer   || '';
  document.getElementById('emComment').value  = q.comment  || '';
  document.getElementById('editModal').classList.add('active');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('active');
  currentEditNum = null;
}

async function saveEditedQuestion() {
  const qText = document.getElementById('emQuestion').value.trim();
  if (!qText) { showToast('Текст запитання не може бути порожнім', 'error'); return; }
  const idx = currentPackage.questions.findIndex(q => q.number === currentEditNum);
  if (idx === -1) return;
  currentPackage.questions[idx] = {
    ...currentPackage.questions[idx],
    topic:    document.getElementById('emTopic').value.trim(),
    question: qText,
    answer:   document.getElementById('emAnswer').value.trim(),
    comment:  document.getElementById('emComment').value.trim(),
  };
  await saveCurrentPackage();
  // Оновлюємо тільки цю картку без повного ререндеру
  const el = document.getElementById(`qi_${currentEditNum}`);
  if (el) el.outerHTML = buildQuestionHTML(currentPackage.questions[idx]);
  closeEditModal();
  showToast('Запитання збережено', 'success');
}

// ── Видалення запитання ───────────────────────
async function deleteQuestion(num) {
  if (!confirm(`Видалити запитання №${num}?`)) return;
  currentPackage.questions = currentPackage.questions.filter(q => q.number !== num);
  await saveCurrentPackage();
  const el = document.getElementById(`qi_${num}`);
  if (el) el.remove();
  closeEditModal();
  document.getElementById('qCount').textContent = currentPackage.questions.length;
  showToast('Запитання видалено', 'info');
}

// ── Додати нове запитання ─────────────────────
async function addNewQuestion() {
  const maxNum = currentPackage.questions.reduce((m, q) => Math.max(m, q.number), 0);
  const newNum = maxNum + 1;
  const newQ = { number: newNum, question: '', answer: '', comment: '', topic: '' };
  currentPackage.questions.push(newQ);
  await saveCurrentPackage();
  document.getElementById('qCount').textContent = currentPackage.questions.length;
  // Додаємо картку перед кнопкою
  const addBtn = document.getElementById('addQuestionBtn');
  const div = document.createElement('div');
  div.innerHTML = buildQuestionHTML(newQ);
  addBtn.parentNode.insertBefore(div.firstElementChild, addBtn);
  // Одразу відкриваємо редактор
  openEditModal(newNum);
}

// ── Drag & Drop (перестановка) ────────────────
let draggedNum = null;

function dragStart(e, num) {
  draggedNum = num;
  setTimeout(() => document.getElementById(`qi_${num}`)?.classList.add('dragging'), 0);
}
function dragOver(e, num) {
  e.preventDefault();
  if (num !== draggedNum) document.getElementById(`qi_${num}`)?.classList.add('drag-over');
}
function dragLeave(e, num) {
  document.getElementById(`qi_${num}`)?.classList.remove('drag-over');
}
async function dragDrop(e, targetNum) {
  e.preventDefault();
  document.getElementById(`qi_${targetNum}`)?.classList.remove('drag-over');
  document.getElementById(`qi_${draggedNum}`)?.classList.remove('dragging');
  if (draggedNum === targetNum) return;

  const questions = currentPackage.questions;
  const fromIdx = questions.findIndex(q => q.number === draggedNum);
  const toIdx   = questions.findIndex(q => q.number === targetNum);
  if (fromIdx === -1 || toIdx === -1) return;

  // Переставляємо в масиві
  const [item] = questions.splice(fromIdx, 1);
  questions.splice(toIdx, 0, item);
  await saveCurrentPackage();
  renderQuestions(currentPackage.questions);
  draggedNum = null;
}

// ── Спойлери ──────────────────────────────────
function toggleSpoiler(num) {
  const s = document.getElementById(`spoiler_${num}`);
  const b = document.getElementById(`toggle_${num}`);
  const open = s.classList.contains('visible');
  s.classList.toggle('visible', !open);
  b.classList.toggle('open', !open);
  b.innerHTML = `<span class="arrow">▶</span> ${open ? 'Показати відповідь' : 'Сховати відповідь'}`;
  open ? revealedSet.delete(num) : revealedSet.add(num);
  updateRevealedCount();
}

function revealAll() {
  currentPackage?.questions.forEach(q => {
    const s = document.getElementById(`spoiler_${q.number}`);
    const b = document.getElementById(`toggle_${q.number}`);
    if (s && !s.classList.contains('visible')) {
      s.classList.add('visible'); b.classList.add('open');
      b.innerHTML = `<span class="arrow">▶</span> Сховати відповідь`;
      revealedSet.add(q.number);
    }
  });
  updateRevealedCount();
}

function collapseAll() {
  currentPackage?.questions.forEach(q => {
    const s = document.getElementById(`spoiler_${q.number}`);
    const b = document.getElementById(`toggle_${q.number}`);
    if (s) {
      s.classList.remove('visible'); b.classList.remove('open');
      b.innerHTML = `<span class="arrow">▶</span> Показати відповідь`;
      revealedSet.delete(q.number);
    }
  });
  updateRevealedCount();
}

function updateRevealedCount() {
  document.getElementById('revealedCount').textContent = revealedSet.size;
}

// ── Пошук ─────────────────────────────────────
function filterQuestions() {
  if (!currentPackage) return;
  const q = document.getElementById('searchInput').value.toLowerCase();
  isSearching = q.length > 0;
  document.getElementById('addQuestionBtn').style.display = isSearching ? 'none' : 'block';
  const filtered = currentPackage.questions.filter(item =>
    item.question.toLowerCase().includes(q) ||
    (item.answer || '').toLowerCase().includes(q) ||
    (item.topic  || '').toLowerCase().includes(q)
  );
  renderQuestions(filtered);
}

// ── Утиліти ───────────────────────────────────
function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('uk-UA',{day:'numeric',month:'long',year:'numeric'}); }
  catch { return d; }
}
function showToast(text, type='info') {
  const icons = {success:'✅',error:'❌',info:'ℹ️'};
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type]}</span><span>${text}</span>`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// ════════════════════════════════════════════
//  МІТКИ (localStorage, особисті)
// ════════════════════════════════════════════
const LABELS_KEY = 'qdkk_labels'; // { uid: { star, hard, check } }
let activeFilter = 'all';

function getLabelsStore() {
  try { return JSON.parse(localStorage.getItem(LABELS_KEY)) || {}; }
  catch { return {}; }
}

function saveLabelsStore(store) {
  localStorage.setItem(LABELS_KEY, JSON.stringify(store));
}

// UID запитання — прив'язаний до пакету і номера
function getQuestionUID(num) {
  return `${currentPackage.id}::${num}`;
}

function getLabels(uid) {
  const store = getLabelsStore();
  return store[uid] || { star: false, hard: false, check: false };
}

function toggleLabel(num, type) {
  const uid   = getQuestionUID(num);
  const store = getLabelsStore();
  if (!store[uid]) store[uid] = { star: false, hard: false, check: false };
  store[uid][type] = !store[uid][type];
  saveLabelsStore(store);

  // Оновлюємо кнопку без повного ре-рендеру
  const btn = document.querySelector(`#qi_${num} .label-btn.${type}`);
  if (btn) btn.classList.toggle('active', store[uid][type]);

  updateLabelCounts();
  // Якщо активний фільтр — перерендерити список
  if (activeFilter !== 'all') applyLabelFilter();
}

// ── Лічильники міток ─────────────────────────
function updateLabelCounts() {
  if (!currentPackage) return;
  const store = getLabelsStore();
  const counts = { star: 0, hard: 0, check: 0 };

  for (const q of currentPackage.questions) {
    const uid = getQuestionUID(q.number);
    const lb  = store[uid] || {};
    if (lb.star)  counts.star++;
    if (lb.hard)  counts.hard++;
    if (lb.check) counts.check++;
  }

  document.getElementById('cnt-star').textContent  = counts.star  || '';
  document.getElementById('cnt-hard').textContent  = counts.hard  || '';
  document.getElementById('cnt-check').textContent = counts.check || '';

  // Показуємо фільтр-бар тільки якщо є хоч одна мітка
  const hasAny = counts.star + counts.hard + counts.check > 0;
  document.getElementById('labelFilterBar').style.display = hasAny ? 'flex' : 'none';
}

// ── Фільтрація по мітках ─────────────────────
function setLabelFilter(type, btn) {
  activeFilter = type;
  // Оновлюємо кнопки фільтру
  document.querySelectorAll('.label-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyLabelFilter();
}

function applyLabelFilter() {
  if (!currentPackage) return;
  if (activeFilter === 'all') {
    renderQuestions(currentPackage.questions);
    return;
  }
  const store = getLabelsStore();
  const filtered = currentPackage.questions.filter(q => {
    const uid = getQuestionUID(q.number);
    const lb  = store[uid] || {};
    return lb[activeFilter];
  });
  renderQuestions(filtered);
}


// ════════════════════════════════════════════
//  ТЕГИ ЗАПИТАНЬ
// ════════════════════════════════════════════

// Готові теми-підказки
const SUGGESTED_TAGS = [
  'Спорт', 'Історія', 'Наука', 'Географія', 'Кіно', 'Музика',
  'Мистецтво', 'Україна', 'Природа', 'Технології', 'Медицина',
  'Література', 'Їжа', 'Мова', 'Математика', 'Філософія',
  'Релігія', 'Політика', 'Економіка', 'Мода', 'Архітектура',
];

// ── Читання/запис тегів ───────────────────────
function getTagsData() {
  return currentPackage?.tags_data || {};
}

function getQuestionTags(num) {
  const data = getTagsData();
  return Array.isArray(data[num]) ? data[num] : [];
}

async function saveTagsData(data) {
  if (!currentPackage) return;
  currentPackage.tags_data = data;
  try {
    await dbUpdateTags(currentPackage.id, data);
  } catch (err) {
    showToast('Помилка збереження тегів: ' + err.message, 'error');
  }
  updateTagFilterBar();
}

// ── Редактор тегів ────────────────────────────
function openTagEditor(num) {
  // Закриваємо всі інші редактори
  document.querySelectorAll('.tag-editor.open').forEach(el => {
    if (el.id !== `tageditor_${num}`) el.classList.remove('open');
  });
  const editor = document.getElementById(`tageditor_${num}`);
  if (!editor) return;
  editor.classList.toggle('open');
  if (editor.classList.contains('open')) {
    setTimeout(() => document.getElementById(`taginput_${num}`)?.focus(), 50);
    showTagSuggestions(num, '');
  }
}

function handleTagInput(e, num) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    addTagFromInput(num);
  } else if (e.key === 'Escape') {
    document.getElementById(`tageditor_${num}`)?.classList.remove('open');
  }
}

async function addTagFromInput(num) {
  const input = document.getElementById(`taginput_${num}`);
  if (!input) return;
  const tag = input.value.trim().replace(/,/g, '').substring(0, 30);
  if (!tag) return;
  await addTag(num, tag);
  input.value = '';
  showTagSuggestions(num, '');
  input.focus();
}

async function addTag(num, tag) {
  const data = { ...getTagsData() };
  if (!data[num]) data[num] = [];
  if (data[num].includes(tag)) return; // вже є
  data[num] = [...data[num], tag];
  await saveTagsData(data);
  rebuildQuestionCard(num);
}

async function removeTag(num, tag) {
  const data = { ...getTagsData() };
  if (!data[num]) return;
  data[num] = data[num].filter(t => t !== tag);
  if (data[num].length === 0) delete data[num];
  await saveTagsData(data);
  rebuildQuestionCard(num);
}

function rebuildQuestionCard(num) {
  const q = currentPackage.questions.find(q => q.number === num);
  if (!q) return;
  const el = document.getElementById(`qi_${num}`);
  if (!el) return;
  const wasOpen = document.getElementById(`tageditor_${num}`)?.classList.contains('open');
  el.outerHTML = buildQuestionHTML(q);
  if (wasOpen) {
    setTimeout(() => openTagEditor(num), 10);
  }
}

// ── Підказки тегів ────────────────────────────
function showTagSuggestions(num, value) {
  const container = document.getElementById(`tagsugg_${num}`);
  if (!container) return;
  const current = getQuestionTags(num);
  const lower = value.toLowerCase();

  // Всі теги що вже є в базі + готові підказки
  const allTags = getAllTagsInPackage();
  const combined = [...new Set([...SUGGESTED_TAGS, ...allTags])];

  const filtered = combined
    .filter(t => !current.includes(t))
    .filter(t => !lower || t.toLowerCase().includes(lower))
    .slice(0, 12);

  container.innerHTML = filtered.map(t =>
    `<span class="tag-suggestion" onclick="addTag(${num},'${escHtml(t)}')">${escHtml(t)}</span>`
  ).join('');
}

function getAllTagsInPackage() {
  const data = getTagsData();
  const all = new Set();
  for (const tags of Object.values(data)) {
    if (Array.isArray(tags)) tags.forEach(t => all.add(t));
  }
  return [...all].sort();
}

// ── Фільтр-бар тегів ─────────────────────────
let activeTagFilter = null;

function updateTagFilterBar() {
  const tags = getAllTagsInPackage();
  const bar = document.getElementById('tagFilterBar');
  const chips = document.getElementById('tagFilterChips');
  if (!bar || !chips) return;

  bar.style.display = tags.length > 0 ? 'block' : 'none';

  chips.innerHTML = tags.map(t => `
    <span class="tag-filter-chip ${activeTagFilter === t ? 'active' : ''}"
          onclick="setTagFilter('${escHtml(t)}',this)">
      ${escHtml(t)}
    </span>`).join('');
}

function setTagFilter(tag, btn) {
  activeTagFilter = tag;

  // Оновлюємо кнопки
  document.querySelectorAll('.tag-filter-chip').forEach(b => b.classList.remove('active'));
  if (btn) {
    btn.classList.add('active');
  } else {
    // Клік з тега запитання — знаходимо кнопку
    const allBtn = document.querySelector('.tag-filter-chip:first-child');
    if (!tag && allBtn) allBtn.classList.add('active');
    // Шукаємо потрібну кнопку в chips
    document.querySelectorAll('#tagFilterChips .tag-filter-chip').forEach(b => {
      if (b.textContent.trim() === tag) b.classList.add('active');
    });
  }

  // Фільтруємо
  if (!tag) {
    renderQuestions(currentPackage.questions);
  } else {
    const data = getTagsData();
    const filtered = currentPackage.questions.filter(q => {
      const tags = data[q.number] || [];
      return tags.includes(tag);
    });
    renderQuestions(filtered);
  }
}
